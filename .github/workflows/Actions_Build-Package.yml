name: Actions Build and Package

on:
  workflow_call:
    inputs:
      version:
        description: |
          选择 OpenWrt 版本
        required: false
        type: string
      
      package:
        description: |
          选择编译插件
        required: false
        type: string

env:
  PACKAGE_NAME: ${{ inputs.package }}
  CACHE_DIR: ~/.cache
  TZ: Asia/Shanghai
  # 修复1：Version → version（大小写敏感，这是隐性语法错误的核心）
  Download_URL: "https://downloads.openwrt.org/releases/${{ inputs.version }}/targets"
  UPLOAD_BIN_DIR: false
  # 补充缺失的环境变量（避免后续运行时错误，也会间接导致语法解析异常）
  SDK_HOME: ~/openwrt-sdk
  IPK_DIR: ~/ipk-output
  Time: ${{ needs.jod_initial.outputs.time }}  # 统一时间变量命名

jobs:
  jod_initial:
    name: Actions Build ${{ inputs.package }}
    runs-on: ubuntu-latest
    outputs:
      # 修复2：表达式添加空格（规范格式，避免解析报错）
      time: ${{ steps.output_time.outputs.time }}
    steps: 
      - name: output Time
        id: output_time
        run: |
          sudo timedatectl set-timezone "${TZ}"
          echo "time=$(date "+%Y.%m.%d_%H%M%S")" >> $GITHUB_OUTPUT

  jod_build:
    name: Build Architecture: ${{ matrix.arch }}
    needs: jod_initial
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            sdk_url_path: layerscape/armv8_64b
            sdk_name: '-sdk-.*-layerscape-armv8_64b_'
          - arch: x86_64
            sdk_url_path: x86/64
            sdk_name: '-sdk-.*-x86-64_'

    env:
      SDK_URL_PATH: ${{ matrix.sdk_url_path }}
      SDK_NAME: ${{ matrix.sdk_name }}
      BUILD_TIME: ${{ needs.jod_initial.outputs.time }}
      OUTPUT_DIR: ${{ github.workspace }}/Output/
      CONFIG_CCACHE: y
      # 补充缺失的环境变量（避免运行时错误）
      SDK_HOME: ${{ env.SDK_HOME }}
      IPK_DIR: ${{ env.IPK_DIR }}

    # 修复3：第39行的steps节点缩进统一为4个空格（与env同级），后续子步骤统一6个空格
    steps: 
      - name: Checkout
        uses: actions/checkout@v4  # 修复：main → v4（稳定版本，避免兼容性语法问题）

      - name: Install Dependencies
        run: |
          sudo apt update -y
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y ccache gettext libncurses5-dev xsltproc \
            gcc g++ build-essential gawk argp-standalone musl-dev musl-fts-dev musl-obstack-dev gettext libintl-dev

      - name: Setup Cache
        uses: actions/cache@v4  # 修复：main → v4
        with:
          path: ${{ env.CACHE_DIR }}
          key: openwrt-${{ matrix.arch }}

      - name: Configure environment variables
        run: |
          test -d "${{ env.CACHE_DIR }}" || mkdir -pm 755 "${{ env.CACHE_DIR }}"
          test -d "${{ env.SDK_HOME }}" || mkdir -pm 755 "${{ env.SDK_HOME }}"
          test -d "${{ env.IPK_DIR }}" || mkdir -pm 755 "${{ env.IPK_DIR }}"

      - name: Download and Unzip SDK
        id: download_sdk  # 补充id，便于后续引用
        run: |
          cd "${{ env.CACHE_DIR }}"
          if [[ $(du -s "${{ env.CACHE_DIR }}" | awk '{ print $1}') -lt 10240 ]]; then
            echo -e "\e[1;32m Start downloading the SDK \e[0m"
            if ! ( wget -qO - "${{ env.Download_URL }}/${{ env.SDK_URL_PATH }}/sha256sums" | grep -- "${{ env.SDK_NAME }}" > sha256sums.small 2>/dev/null ); then
              echo -e "\e[1;31m Error:Can not find ${{ env.SDK_NAME }} file in sha256sums. \e[0m"
              exit 1
            fi
            SDK_FILE="$(cat sha256sums.small | cut -d' ' -f2 | sed 's/*//g')"
            if ! sha256sum -c ./sha256sums.small >/dev/null 2>&1 ; then
              wget -qO "$SDK_FILE" "${{ env.Download_URL }}/${{ env.SDK_URL_PATH }}/$SDK_FILE"
              if ! sha256sum -c ./sha256sums.small >/dev/null 2>&1 ; then
                echo -e "\e[1;31m Error:SDK can not be verified! \e[0m"
                exit 1
              fi
            fi
            tar -I zstd -xf "${SDK_FILE}" -C "${{ env.SDK_HOME }}" --strip=1 && rm -fr ${SDK_FILE}
          fi
          cd "${{ env.SDK_HOME }}"  # 修复：切换到SDK目录再操作文件
          test -d "dl" && rm -rf "dl" || true
          test -d "feeds" && rm -rf "feeds" || true
          cp feeds.conf.default feeds.conf
          sed -i 's#git.openwrt.org/openwrt/openwrt#github.com/openwrt/openwrt#' feeds.conf
          sed -i 's#git.openwrt.org/feed/packages#github.com/openwrt/packages#' feeds.conf
          sed -i 's#git.openwrt.org/project/luci#github.com/openwrt/luci#' feeds.conf
          sed -i 's#git.openwrt.org/feed/telephony#github.com/openwrt/telephony#' feeds.conf
          echo "status=success" >> $GITHUB_OUTPUT
          
      - name: Update and Install Packages
        run: |
          cd "${{ env.SDK_HOME }}"  # 修复：切换到SDK目录
          ./scripts/feeds update -a >/dev/null 2>&1
          find "${{ github.workspace }}" -maxdepth 1 -exec ln -s {} "package/" \;
          rm package/$(basename ${{ github.workspace }})
          ./scripts/feeds install -a >/dev/null 2>&1

      - name: Build Packages
        run: |
          cd "${{ env.SDK_HOME }}"
          make defconfig  >/dev/null
          make package/${{ env.PACKAGE_NAME }}/{clean,compile} V=s
          find "${{ env.SDK_HOME }}/bin/" -type f -name "*.ipk" -exec ls -lh {} \;

      - name: Copy Bin Files
        run: |
          touch release.txt
          echo "${{ env.PACKAGE_NAME }}" > release.txt
          name="*$(echo ${{ env.PACKAGE_NAME }} | sed 's/luci-app-//')*.ipk"
          PACKAGE_DIR="${{ env.SDK_HOME }}/bin/"
          File=$(find "${PACKAGE_DIR}" -name "${name}")
          for dir in $(echo ${File} | sed 's| | |g')
          do
            echo ${dir}
            cp -f ${dir} "${{ env.IPK_DIR }}/$(basename ${dir} | sed 's/_all//' | sed "s/.ipk/_${{ matrix.arch }}.ipk/")"
          done
          find "${{ env.IPK_DIR }}" -name "*.ipk" -exec ls -lh {} \;

      - name: Upload to bin directory
        uses: actions/upload-artifact@v4  # 修复：main → v4
        if: ${{ env.UPLOAD_BIN_DIR == 'true' }}  # 修复：表达式格式
        with:
          name: ${{ matrix.arch }}_package_${{ env.Time }}
          path: ${{ env.SDK_HOME }}/bin 

      - name: Upload to Release
        uses: softprops/action-gh-release@v1  # 修复：master → v1（稳定版本）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.Time }}
          body_path: release.txt
          files: ${{ env.IPK_DIR }}/*.ipk